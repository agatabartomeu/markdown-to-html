<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarkFlow | Conversor Premium de Markdown a HTML</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Convierte tus archivos Markdown a HTML con estilo y de forma instantánea. Editor en tiempo real, plantillas personalizadas y descarga directa de documentos web completos.">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Prism.js Code Highlighting (Dark Theme) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
  
  <!-- Full Screen Drag and Drop Overlay -->
  <div id="dragOverlay" class="drag-overlay">
    <div class="drag-overlay-content">
      <i class="fa-solid fa-cloud-arrow-up drag-icon"></i>
      <h2>Suelta tu archivo Markdown aquí</h2>
      <p>Soportamos archivos .md, .txt y markdown</p>
    </div>
  </div>

  <!-- Header -->
  <header class="main-header">
    <div class="logo-container">
      <div class="logo-icon">
        <i class="fa-solid fa-file-code"></i>
      </div>
      <div class="logo-text">
        <h1>Mark<span class="gradient-text">Flow</span></h1>
        <span class="version-tag">v1.0.0</span>
      </div>
    </div>

    <div class="header-controls">
      <label class="action-btn file-upload-label" id="uploadBtn" title="Subir archivo Markdown">
        <i class="fa-solid fa-file-import"></i>
        <span>Importar .md</span>
        <input type="file" id="fileInput" accept=".md,.txt,.markdown" style="display: none;">
      </label>
      
      <div class="control-group">
        <label for="templateSelector"><i class="fa-solid fa-wand-magic-sparkles"></i> Estilo:</label>
        <select id="templateSelector" class="custom-select">
          <option value="modern-doc" selected>Documentación Moderna</option>
          <option value="elegant-article">Artículo Elegante</option>
          <option value="minimalist">Minimalista Limpio</option>
          <option value="retro-terminal">Consola Retro</option>
        </select>
      </div>

      <button id="themeToggleBtn" class="icon-btn" title="Cambiar Tema (Claro/Oscuro)">
        <i class="fa-solid fa-sun icon-light"></i>
        <i class="fa-solid fa-moon icon-dark"></i>
      </button>
    </div>
  </header>

  <!-- Main Container -->
  <main class="editor-container">
    <!-- Editor Column (Left) -->
    <section class="column-panel editor-panel">
      <div class="panel-header">
        <div class="panel-title">
          <i class="fa-solid fa-edit"></i>
          <span>Editor Markdown</span>
        </div>
        <div class="panel-actions">
          <button id="clearEditorBtn" class="icon-btn small" title="Limpiar Editor">
            <i class="fa-solid fa-trash-can"></i>
          </button>
        </div>
      </div>
      <div class="textarea-wrapper">
        <textarea id="markdownInput" placeholder="# Escribe tu Markdown aquí...

## Características:
* Soporte en tiempo real
* Variedad de plantillas de exportación
* Arrastra y suelta archivos (.md)
* Modo oscuro y claro

### Bloques de código con resaltado de sintaxis:
```javascript
function greet(user) {
  console.log(`¡Hola, ${user}!`);
}
```

Disfruta de una experiencia premium al escribir tus documentos.
" spellcheck="false"></textarea>
      </div>
      <div class="panel-footer" id="editorStats">
        <div class="stat-item"><i class="fa-solid fa-calculator"></i> <span id="wordCount">0</span> palabras</div>
        <div class="stat-item"><i class="fa-solid fa-clock"></i> <span id="readTime">0</span> min de lectura</div>
        <div class="stat-item"><i class="fa-solid fa-text-height"></i> <span id="charCount">0</span> caracteres</div>
      </div>
    </section>

    <!-- Divider / Resizer (Decorative) -->
    <div class="panel-divider"></div>

    <!-- Preview Column (Right) -->
    <section class="column-panel preview-panel">
      <div class="panel-header">
        <div class="panel-title">
          <i class="fa-solid fa-eye"></i>
          <span>Vista Previa HTML</span>
        </div>
        <div class="tab-controls">
          <button id="tabVisualBtn" class="tab-btn active"><i class="fa-solid fa-desktop"></i> Visual</button>
          <button id="tabRawBtn" class="tab-btn"><i class="fa-solid fa-code"></i> Código HTML</button>
        </div>
        <div class="panel-actions">
          <button id="copyBtn" class="action-btn secondary small" title="Copiar al portapapeles">
            <i class="fa-solid fa-copy"></i>
            <span>Copiar</span>
          </button>
          
          <div class="dropdown-wrapper">
            <button id="downloadDropdownBtn" class="action-btn primary small">
              <i class="fa-solid fa-download"></i>
              <span>Exportar</span>
              <i class="fa-solid fa-chevron-down"></i>
            </button>
            <div id="downloadDropdownMenu" class="dropdown-menu">
              <button class="dropdown-item" id="downloadCleanHtmlBtn">
                <i class="fa-solid fa-code"></i>
                <div class="item-text">
                  <strong>HTML Semántico Limpio</strong>
                  <span>Ideal para blogs u otros CMS</span>
                </div>
              </button>
              <button class="dropdown-item" id="downloadStyledHtmlBtn">
                <i class="fa-solid fa-file-lines"></i>
                <div class="item-text">
                  <strong>HTML con Estilo Integrado</strong>
                  <span>Documento independiente listo para usar</span>
                </div>
              </button>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Visual Render Area -->
      <div id="visualPreview" class="preview-content modern-doc">
        <!-- Rendered HTML will go here -->
      </div>

      <!-- Raw Source Code Area -->
      <div id="rawPreview" class="preview-content raw-code-preview" style="display: none;">
        <pre><code id="rawHtmlCode" class="language-html"></code></pre>
      </div>

      <div class="panel-footer preview-footer">
        <span class="status-indicator"><i class="fa-solid fa-circle-check"></i> Sincronizado</span>
        <span id="activeTemplateTag" class="template-tag">Documentación</span>
      </div>
    </section>
  </main>

  <!-- Notification Toast -->
  <div id="toast" class="toast">
    <i class="fa-solid fa-circle-info toast-icon"></i>
    <span id="toastMessage">Mensaje informativo</span>
  </div>

  <!-- Marked.js for Markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <!-- Prism.js for syntax highlighting -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>

  <!-- App Script -->
  <script src="app.js"></script>
</body>
</html>
